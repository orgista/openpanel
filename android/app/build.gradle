apply plugin: 'com.android.application'

def openPanelSigningValue = { String name ->
    def value = project.findProperty(name)
    if (value != null && value.toString().trim()) {
        return value.toString()
    }
    value = System.getenv(name)
    return value != null && value.trim() ? value : null
}

def openPanelReleaseStoreFile = openPanelSigningValue("OPENPANEL_KEYSTORE_FILE") ?: openPanelSigningValue("OPENPANEL_STORE_FILE")
def openPanelReleaseStorePassword = openPanelSigningValue("OPENPANEL_KEYSTORE_PASS")
def openPanelReleaseKeyAlias = openPanelSigningValue("OPENPANEL_KEY_ALIAS")
def openPanelReleaseKeyPassword = openPanelSigningValue("OPENPANEL_KEY_PASS")
def openPanelReleaseSigningReady = openPanelReleaseStoreFile &&
        openPanelReleaseStorePassword &&
        openPanelReleaseKeyAlias &&
        openPanelReleaseKeyPassword

android {
    namespace = "com.orgista.openpanel"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.orgista.openpanel"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 7
        versionName "1.0.6"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (openPanelReleaseSigningReady) {
                storeFile file(openPanelReleaseStoreFile)
                storePassword openPanelReleaseStorePassword
                keyAlias openPanelReleaseKeyAlias
                keyPassword openPanelReleaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (openPanelReleaseSigningReady) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

tasks.register("verifyOpenPanelReleaseSigning") {
    group = "verification"
    description = "Fails release builds unless OpenPanel release signing inputs are present and the keystore file exists."
    doLast {
        def missing = []
        if (!openPanelReleaseStoreFile) missing << "OPENPANEL_KEYSTORE_FILE"
        if (!openPanelReleaseStorePassword) missing << "OPENPANEL_KEYSTORE_PASS"
        if (!openPanelReleaseKeyAlias) missing << "OPENPANEL_KEY_ALIAS"
        if (!openPanelReleaseKeyPassword) missing << "OPENPANEL_KEY_PASS"
        if (!missing.isEmpty()) {
            throw new GradleException("Missing OpenPanel release signing inputs: ${missing.join(', ')}. Keep values in CI/secret manager; do not commit them.")
        }
        if (!file(openPanelReleaseStoreFile).isFile()) {
            throw new GradleException("OpenPanel release keystore file was not found at OPENPANEL_KEYSTORE_FILE.")
        }
    }
}

tasks.matching { task ->
    task.name in ["preReleaseBuild", "assembleRelease", "bundleRelease", "packageRelease"]
}.configureEach {
    dependsOn tasks.named("verifyOpenPanelReleaseSigning")
}
