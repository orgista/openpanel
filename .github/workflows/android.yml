name: Engine CI

# This is the OPEN-CORE engine repo — it has no UI (the React app lives in a
# separate private repo). So CI only verifies that the native engine compiles.
# The full APK / signed-release build needs the private UI + signing secrets and
# lives wherever the UI submodule is available (see docs/open-source-split.md).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  engine:
    name: Native engine compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Capacitor 8 CLI requires Node >=22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3

      - run: npm ci

      # The Capacitor native files (capacitor.config.json, capacitor.plugins.json,
      # the cordova-plugins module) are generated by `cap sync`, not committed.
      # cap sync copies the web dir, so provide a tiny stub (this repo has no UI)
      # just so the engine can be compiled.
      - name: Prepare Capacitor native modules
        run: |
          mkdir -p dist
          printf '<!doctype html><meta charset="utf-8"><title>OpenPanel</title>' > dist/index.html
          npx cap sync android

      - name: Compile native engine (Java)
        working-directory: android
        run: ./gradlew :app:compileDebugJavaWithJavac --no-daemon --stacktrace
